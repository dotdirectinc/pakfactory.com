name: Branch name

# Enforces the branch naming standard: feat/… | feature/… | fix/… | chore/…
# (a PROD-#### Jira key in the description is recommended, e.g. feat/PROD-1957-algolia-search).
# The `staging` promotion branch is exempt (it PRs into main).
# Required status check to select on staging + main: "Validate branch name".
#
# Also runs on `push` to `staging` so this check is stamped on the staging commit
# (like `ci-success`). That lets the auto-opened `staging -> main` promotion PR
# satisfy this required check without a PAT — a PR opened by GITHUB_TOKEN doesn't
# fire `pull_request`, but it inherits the status from the staging push.

on:
    pull_request:
        types: [opened, edited, reopened, synchronize]
        branches: [staging, main]
    push:
        branches: [staging]

permissions:
    contents: read

jobs:
    validate:
        name: Validate branch name
        runs-on: ubuntu-latest
        steps:
            - name: Check head branch name
              # On pull_request use the PR's source branch; on push use the pushed
              # branch (which is `staging` — exempt below).
              env:
                  BRANCH: ${{ github.head_ref || github.ref_name }}
              run: |
                  # Allow the staging -> main promotion branch (and pushes to staging).
                  if [ "$BRANCH" = "staging" ]; then
                    echo "OK: staging promotion branch."
                    exit 0
                  fi
                  # Require an approved prefix with a non-empty description.
                  if echo "$BRANCH" | grep -Eq '^(feat|feature|features|fix|bugfix|hotfix|chore)/.+'; then
                    echo "OK: '$BRANCH' matches the naming standard."
                  else
                    echo "::error::Branch '$BRANCH' must start with one of: feat/ feature/ features/ fix/ bugfix/ hotfix/ chore/ ."
                    echo "Examples: feat/PROD-1957-algolia-search , feature/blog-homepage , fix/blog-toc-card , chore/ci-branch-flow"
                    exit 1
                  fi
