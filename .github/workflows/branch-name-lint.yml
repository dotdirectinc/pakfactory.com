name: Branch name

# Enforces the branch naming standard: feat/… | fix/… | chore/…
# (a PROD-#### Jira key in the description is recommended, e.g. feat/PROD-1957-algolia-search).
# The `staging` promotion branch is exempt (it PRs into main).
# Required status check to select on staging + main: "Validate branch name".

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [staging, main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check head branch name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Allow the staging -> main promotion PR.
          if [ "$HEAD_REF" = "staging" ]; then
            echo "OK: staging promotion branch."
            exit 0
          fi
          # Require feat/ fix/ chore/ prefix with a non-empty description.
          if echo "$HEAD_REF" | grep -Eq '^(feat|fix|chore)/.+'; then
            echo "OK: '$HEAD_REF' matches the naming standard."
          else
            echo "::error::Branch '$HEAD_REF' must start with feat/ , fix/ , or chore/ ."
            echo "Examples: feat/PROD-1957-algolia-search , fix/blog-toc-card , chore/ci-branch-flow"
            exit 1
          fi
